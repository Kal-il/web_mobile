{% extends "../base.html" %} 
{% block titulo %}Lista de Veiculos{% endblock %}
{% block css %}
<style>
    h2 {
      color: #333;
      text-align: center;
  }
  
  .container {
      display: flex;
      flex-direction: column;
      align-items: center;
  }
  
  .card {
      background-color: #69b8b5;
      padding: 20px;
      margin: 15px;
      width: 50%;
      text-align: center;
      border-radius: 5px;
      color: white;
      box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
      transition: 0.3s;
  }
  
  .card:hover {
      box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
  }
  
  .card img {
      width: 100px;
      height: 100px;
      margin-bottom: 15px;
  }
  
  .card li {
      list-style: none;
      padding: 10px;
      margin: 5px;
      text-align: center;
      color: white;
  }
  </style>
{% endblock %}

{% block conteudo %}

<div class = "container">
    <h2 class="title">Lista de Veiculos</h2>
    {% for v in veiculos%}
<div class="card">
    <ul class="UL">
       
        {% if v.foto %}
            <img src="/{{ v.foto }}" class = "IMG">
        {% else %}
            <p>Sem foto</p>
        {% endif %}
        
        <li class = "LI">{{ v }}</li>
        
    </ul>
</div>
{% endfor%}
</div>
    
    {% endblock %}
